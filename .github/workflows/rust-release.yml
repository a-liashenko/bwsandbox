name: Rust Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  TAG: ${{ github.ref_name }}
  BWSANDBOX_BIN: bwsandbox
  BWSANDBOX_NETNS_BIN: bwsandbox-netns

jobs:
  run_tests:
    uses: ./.github/workflows/rust-tests.yml

  release:
    needs: run_tests
    runs-on: ubuntu-latest
    container: rust:1-bullseye
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y libseccomp-dev

      - name: Build release binary
        run: cargo build --release

      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/${{ env.BWSANDBOX_BIN }}
            target/release/${{ env.BWSANDBOX_NETNS_BIN }}
